services:
  beeboard:
    container_name: beeboard-app
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
    env_file:
      - ../backend/.env
    volumes:
      - ${BEEBOARD_DOCKER_DATA:-./data}:/app/data
      - ./certs:/etc/nginx/certs
    ports:
      - "${BEEBOARD_HTTP_PORT:-8080}:80"
      - "${BEEBOARD_HTTPS_PORT:-8443}:443"
    restart: unless-stopped

networks:
  default:
    name: beeboard-net
