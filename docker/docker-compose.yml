version: '3.9'

services:
  backend:
    container_name: beeboard-backend
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../backend/.env
    volumes:
      - ${BEEBOARD_DOCKER_DATA:-./data}:/app/data
    ports:
      - "${BEEBOARD_BACKEND_PORT:-8000}:8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: beeboard
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ${BEEBOARD_DOCKER_DATA:-./data}:/var/www/data
    ports:
      - "${BEEBOARD_HTTP_PORT:-8080}:80"

networks:
  default:
    name: beeboard-net
